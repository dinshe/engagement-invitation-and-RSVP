<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="robots" content="noindex, nofollow, noarchive">
  <title>Hasara &amp; Shehara | RSVP Administration</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">

  <style>
    :root {
      --ivory: #fffaf7;
      --blush: #f3e8e1;
      --champagne: #f7eee8;
      --gold: #b77a34;
      --gold-deep: #87531f;
      --gold-pale: #dfc19e;
      --ink: #211b18;
      --ink-soft: #665950;
      --muted: #8f8279;
      --white: #ffffff;
      --green-bg: #e5f0e1;
      --green: #39733b;
      --red-bg: #f3e3df;
      --red: #a54834;
      --amber-bg: #f7edda;
      --amber: #9a671f;
      --line: rgba(183, 122, 52, 0.22);
      --shadow: 0 18px 54px rgba(73, 45, 30, 0.10);
    }

    * { box-sizing: border-box; }

    html { min-height: 100%; }

    body {
      min-height: 100vh;
      margin: 0;
      color: var(--ink);
      font-family: "Jost", sans-serif;
      background:
        radial-gradient(circle at 8% 0%, rgba(183, 122, 52, 0.13), transparent 28rem),
        radial-gradient(circle at 100% 48%, rgba(215, 190, 175, 0.25), transparent 30rem),
        linear-gradient(180deg, var(--ivory), var(--blush));
      -webkit-font-smoothing: antialiased;
    }

    button, input, select { font: inherit; }

    .shell {
      width: min(1180px, 100%);
      margin: 0 auto;
      padding: 42px 22px 72px;
    }

    .topbar {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 24px;
      margin-bottom: 28px;
    }

    .eyebrow {
      color: var(--gold-deep);
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.28em;
      text-transform: uppercase;
    }

    h1 {
      margin: 8px 0 7px;
      font-family: "Cormorant Garamond", serif;
      font-size: clamp(38px, 6vw, 58px);
      font-weight: 600;
      line-height: 0.96;
    }

    .status-line {
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--ink-soft);
      font-size: 12px;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--amber);
      box-shadow: 0 0 0 4px rgba(154, 103, 31, 0.10);
    }

    .status-dot.online {
      background: var(--green);
      box-shadow: 0 0 0 4px rgba(57, 115, 59, 0.10);
    }

    .status-dot.error {
      background: var(--red);
      box-shadow: 0 0 0 4px rgba(165, 72, 52, 0.10);
    }

    .header-actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      min-height: 40px;
      padding: 10px 17px;
      border: 1px solid transparent;
      border-radius: 999px;
      cursor: pointer;
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.10em;
      text-transform: uppercase;
      transition: transform 0.2s ease, opacity 0.2s ease, box-shadow 0.2s ease;
    }

    .button:hover { transform: translateY(-1px); }
    .button:disabled { cursor: wait; opacity: 0.55; transform: none; }

    .button-primary {
      color: var(--white);
      background: linear-gradient(135deg, #c08a4a, #8c5723);
      box-shadow: 0 9px 25px rgba(135, 83, 31, 0.24);
    }

    .button-secondary {
      color: var(--gold-deep);
      background: rgba(255, 255, 255, 0.60);
      border-color: rgba(183, 122, 52, 0.34);
    }

    .button svg { width: 15px; height: 15px; }

    .stats {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 14px;
      margin-bottom: 20px;
    }

    .stat-card,
    .toolbar,
    .table-panel,
    .notice {
      background: rgba(255, 255, 255, 0.76);
      border: 1px solid var(--line);
      box-shadow: var(--shadow);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }

    .stat-card {
      min-height: 120px;
      padding: 22px;
      border-radius: 10px;
    }

    .stat-number {
      color: var(--gold-deep);
      font-family: "Cormorant Garamond", serif;
      font-size: 38px;
      font-weight: 600;
      line-height: 1;
      font-variant-numeric: tabular-nums;
    }

    .stat-label {
      margin-top: 8px;
      color: var(--ink-soft);
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.13em;
      text-transform: uppercase;
    }

    .toolbar {
      display: grid;
      grid-template-columns: minmax(220px, 1fr) 190px 160px;
      gap: 12px;
      margin-bottom: 16px;
      padding: 15px;
      border-radius: 10px;
    }

    .control {
      width: 100%;
      min-height: 44px;
      padding: 11px 14px;
      color: var(--ink);
      background: rgba(255, 253, 251, 0.90);
      border: 1px solid rgba(183, 122, 52, 0.24);
      border-radius: 7px;
      outline: none;
    }

    .control:focus {
      border-color: var(--gold);
      box-shadow: 0 0 0 3px rgba(183, 122, 52, 0.12);
    }

    .table-panel {
      overflow: hidden;
      border-radius: 10px;
    }

    .table-scroll { overflow-x: auto; }

    table {
      width: 100%;
      min-width: 920px;
      border-collapse: collapse;
    }

    th,
    td {
      padding: 14px 16px;
      text-align: left;
      vertical-align: top;
      border-bottom: 1px solid rgba(183, 122, 52, 0.16);
    }

    th {
      position: sticky;
      top: 0;
      z-index: 1;
      color: var(--ink-soft);
      background: #f5e9e1;
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.10em;
      text-transform: uppercase;
      white-space: nowrap;
    }

    td {
      color: var(--ink);
      font-size: 13px;
      line-height: 1.45;
    }

    tbody tr:hover { background: rgba(247, 238, 232, 0.58); }
    tbody tr:last-child td { border-bottom: 0; }

    .name-cell { min-width: 180px; font-weight: 500; }
    .message-cell { min-width: 220px; max-width: 340px; color: var(--ink-soft); }
    .date-cell { min-width: 165px; color: var(--ink-soft); white-space: nowrap; }

    .pill {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 5px 10px;
      border-radius: 999px;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.04em;
      white-space: nowrap;
    }

    .pill-yes { color: var(--green); background: var(--green-bg); }
    .pill-no { color: var(--red); background: var(--red-bg); }
    .pill-unknown { color: var(--amber); background: var(--amber-bg); }

    .empty,
    .loading,
    .error-state {
      padding: 64px 22px;
      text-align: center;
      color: var(--ink-soft);
      font-size: 13px;
      line-height: 1.7;
    }

    .error-state { color: var(--red); }

    .loader {
      width: 27px;
      height: 27px;
      margin: 0 auto 14px;
      border: 2px solid rgba(183, 122, 52, 0.20);
      border-top-color: var(--gold-deep);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .notice {
      margin-top: 18px;
      padding: 15px 17px;
      color: var(--ink-soft);
      border-left: 3px solid var(--gold);
      border-radius: 6px;
      font-size: 11px;
      line-height: 1.65;
      box-shadow: none;
    }

    .footer {
      padding-top: 26px;
      color: var(--muted);
      text-align: center;
      font-size: 10px;
      letter-spacing: 0.08em;
    }

    @media (max-width: 820px) {
      .stats { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .toolbar { grid-template-columns: 1fr 1fr; }
      .toolbar .search { grid-column: 1 / -1; }
    }

    @media (max-width: 620px) {
      .shell { padding: 28px 15px 54px; }
      .topbar { align-items: flex-start; flex-direction: column; }
      .header-actions { width: 100%; justify-content: flex-start; }
      .stats { gap: 10px; }
      .stat-card { min-height: 105px; padding: 18px 16px; }
      .stat-number { font-size: 33px; }
      .toolbar { grid-template-columns: 1fr; }
      .toolbar .search { grid-column: auto; }
    }
  </style>
</head>
<body>
  <main class="shell">
    <header class="topbar">
      <div>
        <div class="eyebrow">Private Administration</div>
        <h1>RSVP Dashboard</h1>
        <div class="status-line" aria-live="polite">
          <span class="status-dot" id="status-dot"></span>
          <span id="status-text">Loading responses...</span>
        </div>
      </div>

      <div class="header-actions">
        <button class="button button-secondary" id="export-button" type="button" disabled>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" aria-hidden="true">
            <path d="M12 3v12m0 0 4-4m-4 4-4-4M5 19h14" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          Export CSV
        </button>
        <button class="button button-primary" id="refresh-button" type="button">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" aria-hidden="true">
            <path d="M20 11a8 8 0 1 0-2.34 5.66M20 4v7h-7" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          Refresh
        </button>
      </div>
    </header>

    <section class="stats" aria-label="RSVP summary">
      <article class="stat-card">
        <div class="stat-number" id="stat-responses">0</div>
        <div class="stat-label">Responses</div>
      </article>
      <article class="stat-card">
        <div class="stat-number" id="stat-attending">0</div>
        <div class="stat-label">Attending</div>
      </article>
      <article class="stat-card">
        <div class="stat-number" id="stat-guests">0</div>
        <div class="stat-label">Confirmed Guests</div>
      </article>
      <article class="stat-card">
        <div class="stat-number" id="stat-declined">0</div>
        <div class="stat-label">Declined</div>
      </article>
    </section>

    <section class="toolbar" aria-label="Response filters">
      <input class="control search" id="search-input" type="search" placeholder="Search name, phone or message" autocomplete="off">
      <select class="control" id="attendance-filter" aria-label="Filter by attendance">
        <option value="all">All responses</option>
        <option value="yes">Attending</option>
        <option value="no">Declined</option>
      </select>
      <select class="control" id="sort-order" aria-label="Sort responses">
        <option value="newest">Newest first</option>
        <option value="oldest">Oldest first</option>
        <option value="name">Name A-Z</option>
      </select>
    </section>

    <section class="table-panel">
      <div id="dashboard-content" class="loading">
        <div class="loader" aria-hidden="true"></div>
        Loading RSVP responses...
      </div>
    </section>

    <div class="notice" id="system-notice">
      Responses are loaded from the Google Sheet configured through <strong>config.js</strong>.
    </div>

    <footer class="footer">Hasara &amp; Shehara · Engagement RSVP Administration</footer>
  </main>

  <script src="config.js"></script>
  <script>
    (function () {
      "use strict";

      const STORAGE_KEY = "hs-rsvp-2026-responses";
      const PLACEHOLDER_URL = "YOUR_APPS_SCRIPT_WEB_APP_URL_HERE";
      const APPS_SCRIPT_URL = String(
        window.INVITATION_CONFIG && window.INVITATION_CONFIG.APPS_SCRIPT_URL
          ? window.INVITATION_CONFIG.APPS_SCRIPT_URL
          : ""
      ).trim();

      const state = {
        responses: [],
        filteredResponses: [],
        source: "",
      };

      const elements = {
        statusDot: document.getElementById("status-dot"),
        statusText: document.getElementById("status-text"),
        refreshButton: document.getElementById("refresh-button"),
        exportButton: document.getElementById("export-button"),
        searchInput: document.getElementById("search-input"),
        attendanceFilter: document.getElementById("attendance-filter"),
        sortOrder: document.getElementById("sort-order"),
        content: document.getElementById("dashboard-content"),
        notice: document.getElementById("system-notice"),
        responses: document.getElementById("stat-responses"),
        attending: document.getElementById("stat-attending"),
        guests: document.getElementById("stat-guests"),
        declined: document.getElementById("stat-declined"),
      };

      function isConfigured() {
        return Boolean(APPS_SCRIPT_URL) && APPS_SCRIPT_URL !== PLACEHOLDER_URL;
      }

      function normalizeAttendance(value) {
        const normalized = String(value || "").trim().toLowerCase();
        if (normalized === "yes" || normalized === "attending") return "yes";
        if (normalized === "no" || normalized === "declined") return "no";
        return "unknown";
      }

      function normalizeResponse(record, index) {
        const rawDate = record.submittedAt || record.timestamp || "";
        const date = rawDate ? new Date(rawDate) : null;

        return {
          id: String(record.id || "rsvp-" + index),
          submittedAt: date && !Number.isNaN(date.getTime()) ? date.toISOString() : String(rawDate),
          name: String(record.name || "").trim(),
          phone: String(record.phone || "").trim(),
          attending: normalizeAttendance(record.attending),
          guests: Math.max(0, Number(record.guestCount != null ? record.guestCount : record.guests) || 0),
          message: String(record.message || "").trim(),
        };
      }

      function escapeHtml(value) {
        return String(value == null ? "" : value).replace(/[&<>"']/g, function (character) {
          return {
            "&": "&amp;",
            "<": "&lt;",
            ">": "&gt;",
            "\"": "&quot;",
            "'": "&#39;",
          }[character];
        });
      }

      function formatDate(value) {
        if (!value) return "-";
        const date = new Date(value);
        if (Number.isNaN(date.getTime())) return String(value);

        return new Intl.DateTimeFormat("en-LK", {
          dateStyle: "medium",
          timeStyle: "short",
          timeZone: "Asia/Colombo",
        }).format(date);
      }

      function readLocalResponses() {
        try {
          const records = JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]");
          return Array.isArray(records) ? records : [];
        } catch (error) {
          console.warn("Could not read local RSVP responses", error);
          return [];
        }
      }

      function setConnectionStatus(type, text) {
        elements.statusDot.className = "status-dot" + (type ? " " + type : "");
        elements.statusText.textContent = text;
      }

      function renderStatistics() {
        const yesResponses = state.responses.filter(function (record) {
          return record.attending === "yes";
        });

        elements.responses.textContent = String(state.responses.length);
        elements.attending.textContent = String(yesResponses.length);
        elements.declined.textContent = String(
          state.responses.filter(function (record) { return record.attending === "no"; }).length
        );
        elements.guests.textContent = String(
          yesResponses.reduce(function (total, record) { return total + record.guests; }, 0)
        );
      }

      function attendancePill(record) {
        if (record.attending === "yes") {
          return '<span class="pill pill-yes">Attending</span>';
        }
        if (record.attending === "no") {
          return '<span class="pill pill-no">Declined</span>';
        }
        return '<span class="pill pill-unknown">Unknown</span>';
      }

      function applyFilters() {
        const search = elements.searchInput.value.trim().toLowerCase();
        const attendance = elements.attendanceFilter.value;
        const order = elements.sortOrder.value;

        let records = state.responses.filter(function (record) {
          const matchesAttendance = attendance === "all" || record.attending === attendance;
          const searchable = [record.name, record.phone, record.message].join(" ").toLowerCase();
          return matchesAttendance && (!search || searchable.includes(search));
        });

        records.sort(function (first, second) {
          if (order === "name") return first.name.localeCompare(second.name);

          const firstDate = new Date(first.submittedAt).getTime() || 0;
          const secondDate = new Date(second.submittedAt).getTime() || 0;
          return order === "oldest" ? firstDate - secondDate : secondDate - firstDate;
        });

        state.filteredResponses = records;
        renderTable();
      }

      function renderTable() {
        if (!state.filteredResponses.length) {
          elements.content.className = "empty";
          elements.content.innerHTML = state.responses.length
            ? "No responses match the selected filters."
            : "No RSVP responses have been received yet.";
          elements.exportButton.disabled = true;
          return;
        }

        const rows = state.filteredResponses.map(function (record) {
          return `
            <tr>
              <td class="date-cell">${escapeHtml(formatDate(record.submittedAt))}</td>
              <td class="name-cell">${escapeHtml(record.name || "-")}</td>
              <td>${escapeHtml(record.phone || "-")}</td>
              <td>${attendancePill(record)}</td>
              <td>${escapeHtml(record.guests)}</td>
              <td class="message-cell">${escapeHtml(record.message || "-")}</td>
            </tr>
          `;
        }).join("");

        elements.content.className = "table-scroll";
        elements.content.innerHTML = `
          <table>
            <thead>
              <tr>
                <th>Submitted</th>
                <th>Invitee</th>
                <th>WhatsApp</th>
                <th>Response</th>
                <th>Guests</th>
                <th>Message</th>
              </tr>
            </thead>
            <tbody>${rows}</tbody>
          </table>
        `;
        elements.exportButton.disabled = false;
      }

      function setResponses(records, source) {
        state.responses = records.map(normalizeResponse);
        state.source = source;
        renderStatistics();
        applyFilters();

        setConnectionStatus("online", state.responses.length + " response" + (state.responses.length === 1 ? "" : "s") + " · " + source);
      }

      async function fetchSharedResponses() {
        const separator = APPS_SCRIPT_URL.includes("?") ? "&" : "?";
        const response = await fetch(
          APPS_SCRIPT_URL + separator + "action=list&ts=" + Date.now(),
          { method: "GET", cache: "no-store", redirect: "follow" }
        );

        if (!response.ok) {
          throw new Error("The server returned HTTP " + response.status + ".");
        }

        const payload = await response.json();
        if (!payload || payload.ok !== true || !Array.isArray(payload.responses)) {
          throw new Error(payload && payload.error ? payload.error : "Unexpected response from the RSVP collector.");
        }

        return payload.responses;
      }

      async function loadResponses() {
        elements.refreshButton.disabled = true;
        elements.content.className = "loading";
        elements.content.innerHTML = '<div class="loader" aria-hidden="true"></div>Loading RSVP responses...';
        setConnectionStatus("", "Connecting to RSVP collector...");

        if (!isConfigured()) {
          const localRecords = readLocalResponses();
          setResponses(localRecords, "this browser only");
          elements.notice.innerHTML = "Google Apps Script is not configured in <strong>config.js</strong>. Only responses stored in this browser can be displayed.";
          elements.refreshButton.disabled = false;
          return;
        }

        try {
          const records = await fetchSharedResponses();
          setResponses(records, "Google Sheet");
          elements.notice.innerHTML = "Showing shared responses from the configured Google Sheet. Use <strong>Refresh</strong> to retrieve the latest submissions.";
        } catch (error) {
          console.error("Unable to load shared RSVP responses", error);
          const localRecords = readLocalResponses();

          if (localRecords.length) {
            setResponses(localRecords, "local fallback");
            setConnectionStatus("error", "Shared connection failed · local fallback shown");
            elements.notice.textContent = "Could not load the shared Google Sheet: " + error.message;
          } else {
            state.responses = [];
            state.filteredResponses = [];
            renderStatistics();
            elements.content.className = "error-state";
            elements.content.textContent = "Could not load the shared RSVP list. Confirm the Apps Script deployment and access permissions, then refresh.";
            setConnectionStatus("error", "Connection failed");
            elements.notice.textContent = error.message;
          }
        } finally {
          elements.refreshButton.disabled = false;
        }
      }

      function csvCell(value) {
        return '"' + String(value == null ? "" : value).replace(/"/g, '""') + '"';
      }

      function exportCsv() {
        if (!state.filteredResponses.length) return;

        const header = ["Submitted At", "Name", "Phone", "Attending", "Guests", "Message"];
        const rows = state.filteredResponses.map(function (record) {
          return [
            formatDate(record.submittedAt),
            record.name,
            record.phone,
            record.attending === "yes" ? "Yes" : record.attending === "no" ? "No" : "Unknown",
            record.guests,
            record.message,
          ];
        });

        const csv = [header].concat(rows).map(function (row) {
          return row.map(csvCell).join(",");
        }).join("\r\n");

        const blob = new Blob(["\uFEFF" + csv], { type: "text/csv;charset=utf-8" });
        const url = URL.createObjectURL(blob);
        const anchor = document.createElement("a");
        anchor.href = url;
        anchor.download = "Nethmi-Dinuth-RSVP-Responses.csv";
        document.body.appendChild(anchor);
        anchor.click();
        anchor.remove();
        URL.revokeObjectURL(url);
      }

      elements.refreshButton.addEventListener("click", loadResponses);
      elements.exportButton.addEventListener("click", exportCsv);
      elements.searchInput.addEventListener("input", applyFilters);
      elements.attendanceFilter.addEventListener("change", applyFilters);
      elements.sortOrder.addEventListener("change", applyFilters);

      loadResponses();
    })();
  </script>
</body>
</html>
