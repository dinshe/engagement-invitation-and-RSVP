<!DOCTYPE html>
<html lang="en" class="gate-active">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Nethmi & Dinuth | 20th August 2026</title>
<meta name="description" content="A personal invitation to the engagement ceremony of Nethmi & Dinuth on 20th August 2026 at Rock Fort Beach Resort, Galle.">

<!-- Open Graph so the WhatsApp link preview looks good -->
<meta property="og:title" content="Nethmi & Dinuth — Engagement Ceremony">
<meta property="og:description" content="20th August 2026 · Rock Fort Beach Resort, Unawatuna, Galle">
<meta property="og:type" content="website">
<!-- Replace with the full https:// address of invitation-flyer.jpg once this is hosted, so the WhatsApp preview shows the flyer itself -->
<meta property="og:image" content="https://YOUR-DOMAIN-HERE/invitation-flyer.jpg">
<meta property="og:image:width" content="1400">
<meta property="og:image:height" content="1875">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,400&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
:root{
  --off-white:#FBF8F3;
  --beige:#EFE6D4;
  --champagne:#F1E7D2;
  --gold:#C9A24A;
  --gold-deep:#A9812F;
  --gold-pale:#E4CE95;
  --silver:#9A9C9E;
  --silver-light:#D9DADB;
  --ink:#2B2620;
  --ink-soft:#5B5346;
  --white:#ffffff;
  --shadow-soft: 0 10px 40px rgba(43,38,32,0.08);
  --shadow-card: 0 20px 60px rgba(43,38,32,0.12);
}

*{box-sizing:border-box; margin:0; padding:0;}

html{scroll-behavior:smooth;}

body{
  background:
    radial-gradient(ellipse 90% 55% at 50% -5%, rgba(201,162,74,0.16), transparent 60%),
    radial-gradient(ellipse 70% 40% at 85% 15%, rgba(201,162,74,0.08), transparent),
    linear-gradient(180deg, var(--off-white) 0%, var(--beige) 100%);
  color:var(--ink);
  font-family:'Jost', sans-serif;
  font-weight:400;
  min-height:100vh;
  overflow-x:hidden;
  -webkit-font-smoothing:antialiased;
}

@media (prefers-reduced-motion: reduce){
  *{animation-duration:0.01ms !important; animation-iteration-count:1 !important; transition-duration:0.01ms !important; scroll-behavior:auto !important;}
}

.wrap{
  max-width:560px;
  margin:0 auto;
  position:relative;
  padding:0 24px;
}

/* ---------- Utility ---------- */
.eyebrow{
  font-family:'Jost', sans-serif;
  font-size:11px;
  letter-spacing:0.32em;
  text-transform:uppercase;
  color:var(--gold-deep);
  font-weight:500;
  text-align:center;
}

.serif{font-family:'Cormorant Garamond', serif;}

.divider{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:14px;
  margin:0 auto;
  width:100%;
  max-width:320px;
}
.divider svg{flex-shrink:0;}
.divider .line{
  height:1px;
  flex:1;
  background:linear-gradient(90deg, transparent, var(--gold) 50%, transparent);
  opacity:0.6;
}

section{
  position:relative;
  padding:88px 0;
}
section:not(:last-of-type)::after{
  content:'';
  position:absolute;
  bottom:0;
  left:50%;
  transform:translateX(-50%);
  width:64px;
  height:1px;
  background:linear-gradient(90deg, transparent, var(--gold) 50%, transparent);
  opacity:0.5;
}

/* ---------- Gate (tap-to-open first impression) ---------- */
html.gate-active{overflow:hidden;}
html.gate-active body{overflow:hidden;}

.gate{
  position:fixed;
  inset:0;
  z-index:1000;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
  background:
    radial-gradient(ellipse 90% 55% at 50% -5%, rgba(201,162,74,0.16), transparent 60%),
    radial-gradient(ellipse 70% 40% at 85% 15%, rgba(201,162,74,0.08), transparent),
    linear-gradient(180deg, var(--off-white) 0%, var(--beige) 100%);
  transition:opacity 0.85s ease, transform 0.85s cubic-bezier(0.65,0,0.35,1), filter 0.85s ease;
}
.gate:focus-visible{
  outline:2px solid var(--gold-deep);
  outline-offset:-6px;
}
.gate.opening{
  opacity:0;
  transform:scale(1.06);
  filter:blur(8px);
  pointer-events:none;
}

.gate-frame{
  position:relative;
  width:100%;
  padding:24px 0;
  text-align:center;
}

.corner{
  position:absolute;
  width:34px;
  height:34px;
  opacity:0;
  animation:corner-in 1s ease forwards;
}
.corner svg{width:100%; height:100%;}
.corner.tl{top:0; left:8px; transform:rotate(0deg); animation-delay:0.1s;}
.corner.tr{top:0; right:8px; transform:rotate(90deg); animation-delay:0.2s;}
.corner.bl{bottom:0; left:8px; transform:rotate(-90deg); animation-delay:0.3s;}
.corner.br{bottom:0; right:8px; transform:rotate(180deg); animation-delay:0.4s;}
@keyframes corner-in{
  to{opacity:0.7;}
}

.monogram-wrap{
  width:168px;
  height:168px;
  margin:8px auto 28px;
  position:relative;
}
.monogram-wrap svg{width:100%; height:100%; overflow:visible; position:relative; z-index:2;}

.monogram-glow{
  position:absolute;
  top:50%;
  left:50%;
  width:230px;
  height:230px;
  transform:translate(-50%,-50%);
  border-radius:50%;
  background:radial-gradient(circle, rgba(201,162,74,0.35) 0%, rgba(201,162,74,0.14) 45%, transparent 72%);
  z-index:1;
  opacity:0;
  animation:glow-in 1.6s ease forwards, glow-pulse 4s ease-in-out infinite;
  animation-delay:0.2s, 1.8s;
  pointer-events:none;
}
@keyframes glow-in{
  to{opacity:1;}
}
@keyframes glow-pulse{
  0%,100%{transform:translate(-50%,-50%) scale(1); opacity:0.85;}
  50%{transform:translate(-50%,-50%) scale(1.12); opacity:1;}
}

/* Sparkle particles: small drifting gold points across the hero */
.sparkle-field{
  position:absolute;
  inset:0;
  pointer-events:none;
  overflow:hidden;
  z-index:0;
}
.sparkle{
  position:absolute;
  border-radius:50%;
  background:var(--gold);
  opacity:0;
  animation:sparkle-drift linear infinite, sparkle-twinkle ease-in-out infinite;
}
@keyframes sparkle-twinkle{
  0%,100%{opacity:0;}
  50%{opacity:0.7;}
}
@keyframes sparkle-drift{
  from{transform:translateY(0);}
  to{transform:translateY(-40px);}
}

.monogram-ring{
  fill:none;
  stroke:var(--gold);
  stroke-width:1;
  opacity:0.5;
}

.monogram-letters path{
  fill:none;
  stroke:var(--gold-deep);
  stroke-width:3;
  stroke-linecap:round;
  stroke-linejoin:round;
  opacity:0;
}
.monogram-letters path.draw-ready{
  opacity:1;
  animation:draw-monogram 1.8s cubic-bezier(0.65,0,0.35,1) forwards;
}
.monogram-letters path.p1.draw-ready{animation-delay:0.3s;}
.monogram-letters path.p2.draw-ready{animation-delay:1.0s;}

@keyframes draw-monogram{
  from{stroke-dashoffset:var(--path-len);}
  to{stroke-dashoffset:0;}
}
@keyframes fade-in-simple{
  to{opacity:0.85;}
}

/* ---------- Gate tap prompt ---------- */
.gate-cta{
  margin-top:8px;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:16px;
}
.gate-tap-ring{
  position:relative;
  width:60px;
  height:60px;
  border-radius:50%;
  border:1px solid var(--gold);
  display:flex;
  align-items:center;
  justify-content:center;
  color:var(--gold-deep);
  opacity:0;
  animation:fade-in-simple 1s ease forwards;
  animation-delay:2.6s;
}
.gate-tap-ring svg{width:22px; height:22px;}
.gate-tap-ring::before{
  content:'';
  position:absolute;
  inset:-9px;
  border-radius:50%;
  border:1px solid var(--gold-pale);
  animation:tap-pulse 2.4s ease-out infinite;
  animation-delay:3.4s;
}
@keyframes tap-pulse{
  0%{transform:scale(0.82); opacity:0.9;}
  100%{transform:scale(1.4); opacity:0;}
}
.gate-cta-text{
  font-size:11.5px;
  letter-spacing:0.3em;
  text-transform:uppercase;
  color:var(--ink-soft);
  font-weight:500;
  opacity:0;
  animation:fade-in-simple 1s ease forwards;
  animation-delay:2.8s;
}

@keyframes cue-bob{
  0%,100%{transform:translateY(0);}
  50%{transform:translateY(6px);}
}

/* ---------- Flyer (revealed once the gate opens) ---------- */

.flyer-section {
  width: 100%;
  text-align: center;
  overflow: hidden;
  background: #f8efea;
  padding-bottom: 40px;
}


.flyer-image {
  display: block;
  width: 100%;
  max-width: 900px;
  height: auto;
  margin-left: auto;
  margin-right: auto;
  object-fit: contain;
  object-position: center;
  opacity:0;
  transform:scale(1.04);
  transition:opacity 1s ease 0.1s, transform 1.1s cubic-bezier(0.16,1,0.3,1) 0.1s;
}

body.invitation-open .flyer-image{
  opacity:1;
  transform:scale(1);
}
.post-flyer-cue{
  margin-top:26px;
  opacity:0;
  color:var(--silver);
  transition:opacity 1s ease 1s;
}
body.invitation-open .post-flyer-cue{
  opacity:0.7;
  animation:cue-bob 2.4s ease-in-out infinite;
}

/* ---------- Countdown ---------- */
.countdown-row{
  display:flex;
  justify-content:center;
  gap:14px;
  margin-top:36px;
  flex-wrap:wrap;
}
.countdown-cell{
  background:linear-gradient(160deg, var(--white), var(--champagne));
  border:1px solid var(--gold-pale);
  border-radius:14px;
  padding:16px 14px;
  min-width:68px;
  text-align:center;
  box-shadow:var(--shadow-soft);
}
.countdown-num{
  font-family:'Cormorant Garamond', serif;
  font-size:30px;
  font-weight:600;
  color:var(--gold-deep);
  line-height:1;
  font-variant-numeric:tabular-nums;
}
.countdown-label{
  font-size:9.5px;
  letter-spacing:0.14em;
  text-transform:uppercase;
  color:var(--ink-soft);
  margin-top:6px;
}

/* ---------- Section heading pattern ---------- */
.section-head{
  text-align:center;
  margin-bottom:44px;
}
.section-title{
  font-family:'Cormorant Garamond', serif;
  font-size:clamp(30px, 8vw, 38px);
  font-weight:500;
  margin-top:10px;
  color:var(--ink);
}

/* ---------- Families ---------- */
.families-grid{
  display:grid;
  grid-template-columns:1fr;
  gap:20px;
}
.family-card{
  background:linear-gradient(165deg, rgba(255,255,255,0.7), rgba(241,231,210,0.5));
  border:1px solid var(--gold-pale);
  border-radius:20px;
  padding:32px 26px;
  text-align:center;
  box-shadow:var(--shadow-soft);
  position:relative;
}
.family-side-label{
  font-size:10.5px;
  letter-spacing:0.24em;
  text-transform:uppercase;
  color:var(--silver);
  font-weight:500;
}
.family-parents{
  font-family:'Cormorant Garamond', serif;
  font-size:22px;
  color:var(--ink);
  margin-top:12px;
  line-height:1.5;
}
.family-child{
  margin-top:14px;
  font-size:13px;
  letter-spacing:0.06em;
  color:var(--gold-deep);
}
.family-divider-row{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:12px;
  padding:6px 0;
}
.family-divider-row .amp-mark{
  font-family:'Cormorant Garamond', serif;
  font-style:italic;
  color:var(--gold);
  font-size:20px;
}

.together-line{
  text-align:center;
  font-family:'Cormorant Garamond', serif;
  font-style:italic;
  font-size:20px;
  color:var(--ink-soft);
  margin-bottom:36px;
}

/* ---------- Details cards (date/time/venue) ---------- */
.details-stack{
  display:flex;
  flex-direction:column;
  gap:16px;
}
.detail-card{
  display:flex;
  align-items:flex-start;
  gap:18px;
  background:rgba(255,255,255,0.55);
  border:1px solid var(--gold-pale);
  border-radius:18px;
  padding:22px 22px;
  box-shadow:var(--shadow-soft);
}
.detail-icon{
  flex-shrink:0;
  width:44px;
  height:44px;
  border-radius:50%;
  background:linear-gradient(160deg, var(--gold-pale), var(--gold));
  display:flex;
  align-items:center;
  justify-content:center;
  color:var(--white);
}
.detail-icon svg{width:20px; height:20px;}
.detail-body .detail-label{
  font-size:10px;
  letter-spacing:0.16em;
  text-transform:uppercase;
  color:var(--silver);
  font-weight:500;
}
.detail-body .detail-value{
  font-family:'Cormorant Garamond', serif;
  font-size:21px;
  color:var(--ink);
  margin-top:3px;
  line-height:1.35;
}
.detail-body .detail-sub{
  font-size:12.5px;
  color:var(--ink-soft);
  margin-top:2px;
}

/* ---------- Venue / map ---------- */
.venue-card{
  margin-top:20px;
  border-radius:20px;
  overflow:hidden;
  border:1px solid var(--gold-pale);
  box-shadow:var(--shadow-card);
}
.venue-map-frame{
  width:100%;
  aspect-ratio:16/10;
  border:0;
  display:block;
  filter:sepia(8%) saturate(92%);
}
.venue-card-body{
  padding:22px 24px 26px;
  background:rgba(255,255,255,0.6);
  text-align:center;
}
.venue-name{
  font-family:'Cormorant Garamond', serif;
  font-size:22px;
  color:var(--ink);
}
.venue-address{
  font-size:13px;
  color:var(--ink-soft);
  margin-top:6px;
  line-height:1.6;
}
.venue-btn-row{
  margin-top:18px;
  display:flex;
  gap:12px;
  justify-content:center;
  flex-wrap:wrap;
}
.btn-gold, .btn-outline{
  display:inline-flex;
  align-items:center;
  gap:8px;
  padding:12px 22px;
  border-radius:999px;
  font-size:12.5px;
  letter-spacing:0.08em;
  text-transform:uppercase;
  font-weight:500;
  text-decoration:none;
  cursor:pointer;
  transition:transform 0.25s ease, box-shadow 0.25s ease;
  border:none;
}
.btn-gold{
  background:linear-gradient(135deg, var(--gold), var(--gold-deep));
  color:var(--white);
  box-shadow:0 8px 24px rgba(169,129,47,0.35);
}
.btn-outline{
  background:transparent;
  border:1px solid var(--gold);
  color:var(--gold-deep);
}
.btn-gold:hover, .btn-outline:hover{
  transform:translateY(-2px);
}
.btn-gold:active, .btn-outline:active{
  transform:translateY(0px) scale(0.98);
}

/* ---------- Dress code ---------- */
.dress-swatches{
  display:flex;
  justify-content:center;
  gap:18px;
  margin-top:26px;
}
.swatch{
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:8px;
}
.swatch-circle{
  width:46px;
  height:46px;
  border-radius:50%;
  border:1px solid rgba(0,0,0,0.06);
  box-shadow:inset 0 0 0 1px rgba(255,255,255,0.4), var(--shadow-soft);
}
.swatch-label{
  font-size:10px;
  letter-spacing:0.06em;
  color:var(--ink-soft);
}

/* ---------- RSVP ---------- */
.rsvp-card{
  background:linear-gradient(170deg, rgba(255,255,255,0.75), rgba(241,231,210,0.55));
  border:1px solid var(--gold-pale);
  border-radius:24px;
  padding:36px 26px 30px;
  box-shadow:var(--shadow-card);
}
.form-group{
  margin-bottom:20px;
}
.form-label{
  display:block;
  font-size:11px;
  letter-spacing:0.12em;
  text-transform:uppercase;
  color:var(--ink-soft);
  font-weight:500;
  margin-bottom:8px;
}
.form-input{
  width:100%;
  padding:14px 16px;
  border-radius:12px;
  border:1px solid var(--silver-light);
  background:rgba(255,255,255,0.75);
  font-family:'Jost', sans-serif;
  font-size:15px;
  color:var(--ink);
  outline:none;
  transition:border-color 0.2s ease, box-shadow 0.2s ease;
}
.form-input:focus{
  border-color:var(--gold);
  box-shadow:0 0 0 3px rgba(201,162,74,0.15);
}
.attend-toggle{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
}
.attend-btn{
  padding:16px 10px;
  border-radius:14px;
  border:1.5px solid var(--silver-light);
  background:rgba(255,255,255,0.6);
  font-family:'Jost', sans-serif;
  font-size:14px;
  font-weight:500;
  color:var(--ink-soft);
  cursor:pointer;
  transition:all 0.25s cubic-bezier(0.16,1,0.3,1);
  text-align:center;
}
.attend-btn .attend-icon{display:block; font-size:20px; margin-bottom:6px;}
.attend-btn.selected-yes{
  border-color:var(--gold);
  background:linear-gradient(160deg, var(--gold-pale), var(--champagne));
  color:var(--gold-deep);
  box-shadow:0 6px 18px rgba(201,162,74,0.25);
  transform:translateY(-2px);
}
.attend-btn.selected-no{
  border-color:var(--silver);
  background:var(--silver-light);
  color:var(--ink-soft);
  transform:translateY(-2px);
}

.guest-stepper{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:24px;
  padding:8px 0;
}
.stepper-btn{
  width:44px;
  height:44px;
  border-radius:50%;
  border:1.5px solid var(--gold);
  background:rgba(255,255,255,0.7);
  color:var(--gold-deep);
  font-size:20px;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
  transition:transform 0.15s ease, background 0.15s ease;
  user-select:none;
}
.stepper-btn:active{transform:scale(0.92);}
.stepper-btn:disabled{opacity:0.35; cursor:not-allowed;}
.stepper-count{
  font-family:'Cormorant Garamond', serif;
  font-size:34px;
  color:var(--ink);
  min-width:50px;
  text-align:center;
  font-variant-numeric:tabular-nums;
}

.guest-fields{
  overflow:hidden;
  max-height:0;
  opacity:0;
  transition:max-height 0.5s cubic-bezier(0.16,1,0.3,1), opacity 0.4s ease;
}
.guest-fields.open{
  max-height:600px;
  opacity:1;
}

.submit-btn{
  width:100%;
  padding:16px;
  border-radius:14px;
  border:none;
  background:linear-gradient(135deg, var(--gold), var(--gold-deep));
  color:var(--white);
  font-family:'Jost', sans-serif;
  font-size:14px;
  letter-spacing:0.1em;
  text-transform:uppercase;
  font-weight:500;
  cursor:pointer;
  box-shadow:0 10px 28px rgba(169,129,47,0.35);
  transition:transform 0.2s ease;
  margin-top:6px;
}
.submit-btn:hover{transform:translateY(-2px);}
.submit-btn:active{transform:translateY(0) scale(0.98);}
.submit-btn:disabled{opacity:0.5; cursor:not-allowed; transform:none;}

.form-error{
  font-size:12px;
  color:#B5502F;
  margin-top:6px;
  min-height:16px;
}

.rsvp-success{
  text-align:center;
  padding:20px 6px;
}
.rsvp-success-icon{
  width:64px;
  height:64px;
  margin:0 auto 18px;
  border-radius:50%;
  background:linear-gradient(160deg, var(--gold-pale), var(--gold));
  display:flex;
  align-items:center;
  justify-content:center;
  color:var(--white);
  animation:pop-in 0.6s cubic-bezier(0.34,1.56,0.64,1);
}
@keyframes pop-in{
  from{transform:scale(0); opacity:0;}
  to{transform:scale(1); opacity:1;}
}
.rsvp-success-title{
  font-family:'Cormorant Garamond', serif;
  font-size:26px;
  color:var(--ink);
}
.rsvp-success-sub{
  font-size:13.5px;
  color:var(--ink-soft);
  margin-top:10px;
  line-height:1.6;
}

/* ---------- Footer ---------- */
.footer{
  text-align:center;
  padding:60px 0 40px;
}
.footer-monogram{
  font-family:'Cormorant Garamond', serif;
  font-style:italic;
  font-size:24px;
  color:var(--gold);
}
.footer-line{
  font-size:11px;
  color:var(--silver);
  margin-top:14px;
  letter-spacing:0.04em;
}

/* ---------- Admin (RSVP viewer) ---------- */
.admin-wrap{
  max-width:720px;
  margin:0 auto;
  padding:40px 20px 80px;
}
.admin-table-card{
  background:rgba(255,255,255,0.7);
  border:1px solid var(--gold-pale);
  border-radius:18px;
  overflow:hidden;
  box-shadow:var(--shadow-soft);
}
table.admin-table{
  width:100%;
  border-collapse:collapse;
  font-size:13.5px;
}
.admin-table th{
  text-align:left;
  padding:14px 16px;
  background:var(--champagne);
  font-size:10.5px;
  letter-spacing:0.08em;
  text-transform:uppercase;
  color:var(--ink-soft);
  font-weight:500;
}
.admin-table td{

/* ==========================================================
   PREMIUM FLYER OVERLAY + AMBIENT MUSIC EXPERIENCE
   Frontend only. RSVP and backend behavior are untouched.
   ========================================================== */
:root {
  --flyer-progress: 0;
  --flyer-opacity: 1;
  --flyer-scale: 1;
  --flyer-blur: 0px;
}

/* The flyer remains behind the invitation story while later content rises over it. */
#flyer-section.flyer-stage {
  position: sticky;
  top: 0;
  z-index: 1;
  height: 100svh;
  min-height: 620px;
  display: grid;
  place-items: center;
  padding: clamp(18px, 4vh, 42px) 0;
  overflow: hidden;
  isolation: isolate;
  background: #f8efea;
}

#flyer-section.flyer-stage::before {
  content: "";
  position: absolute;
  inset: 0;
  z-index: -1;
  background:
    linear-gradient(180deg,
      rgba(255,250,247,calc(.02 + var(--flyer-progress) * .42)) 0%,
      rgba(247,238,232,calc(.05 + var(--flyer-progress) * .68)) 68%,
      rgba(243,232,225,calc(.20 + var(--flyer-progress) * .76)) 100%),
    radial-gradient(circle at 50% 18%, rgba(183,122,52,.10), transparent 58%);
  pointer-events: none;
}

#flyer-section.flyer-stage::after {
  content: "";
  position: absolute;
  left: 0;
  right: 0;
  bottom: 0;
  height: 42%;
  background: linear-gradient(180deg, transparent, rgba(243,232,225,.94));
  opacity: calc(.08 + var(--flyer-progress) * .92);
  pointer-events: none;
}

#flyer-section.flyer-stage .flyer-image {
  width: auto;
  height: min(94svh, 920px);
  max-width: min(100%, 900px);
  object-fit: contain;
  opacity: var(--flyer-opacity) !important;
  filter: blur(var(--flyer-blur)) saturate(calc(1 - var(--flyer-progress) * .18));
  transform: scale(var(--flyer-scale)) !important;
  transform-origin: center top;
  will-change: opacity, transform, filter;
  transition: opacity .08s linear, transform .08s linear, filter .08s linear;
}

/* Every section after the flyer becomes the foreground story layer. */
#root > .invitee-card,
#root > .invitee-card ~ section,
#root > .invitee-card ~ footer {
  position: relative;
  z-index: 3;
}

#root > .invitee-card {
  margin-top: -12svh;
  margin-bottom: 26px;
  transform: translateY(72px) scale(.985);
  opacity: 0;
  filter: blur(8px);
  box-shadow: 0 28px 74px rgba(73,45,30,.18);
  transition:
    opacity .9s ease,
    transform 1s cubic-bezier(.16,1,.3,1),
    filter .85s ease;
}

#root > .invitee-card.premium-visible {
  transform: translateY(0) scale(1);
  opacity: 1;
  filter: blur(0);
}

#root > .invitee-card ~ section {
  background:
    linear-gradient(180deg, rgba(255,250,247,.92), rgba(243,232,225,.94));
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
}

#root > .invitee-card ~ section:nth-of-type(even) {
  background:
    linear-gradient(180deg, rgba(247,238,232,.93), rgba(255,250,247,.95));
}

#root > .invitee-card ~ footer {
  background: linear-gradient(180deg, rgba(243,232,225,.95), #efe0d5);
}

/* More dimensional reveal for the existing content, without changing its markup. */
.premium-reveal {
  opacity: 0;
  transform: translate3d(0, 54px, 0) scale(.99);
  filter: blur(6px);
  transition:
    opacity .85s ease,
    transform .95s cubic-bezier(.16,1,.3,1),
    filter .8s ease;
}

.premium-reveal.premium-visible {
  opacity: 1;
  transform: translate3d(0, 0, 0) scale(1);
  filter: blur(0);
}

  <source src="engagement-music.mp3" type="audio/mpeg">

  <span class="audio-icon" aria-hidden="true">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <path d="M9 18V5l10-2v13"></path>
      <circle cx="6" cy="18" r="3"></circle>
      <circle cx="16" cy="16" r="3"></circle>
    </svg>

<script>
(function () {
  "use strict";

  const MAX_SUPPORTED_GUESTS = 10;

  function sanitizeName(value) {
    return String(value || "")
      .replace(/[<>]/g, "")
      .replace(/\s+/g, " ")
      .trim()
      .slice(0, 90);
  }

  function getPersonalInvitation() {
    const params = new URLSearchParams(window.location.search);
    const invitee = sanitizeName(params.get("invitee") || params.get("to"));
    const parsedGuests = Number.parseInt(params.get("guests") || params.get("g"), 10);
    const hasValidGuestCount = Number.isInteger(parsedGuests) && parsedGuests >= 1;
    const guests = hasValidGuestCount
      ? Math.min(parsedGuests, MAX_SUPPORTED_GUESTS)
      : 1;

    return {
      invitee,
      guests,
      isValid: Boolean(invitee) && hasValidGuestCount
    };
  }

  function textElement(tag, className, text) {
    const element = document.createElement(tag);
    element.className = className;
    element.textContent = text;
    return element;
  }

  function buildInviteeCard(invitation) {
    const card = document.createElement("section");
    card.className = "invitee-card is-visible fade-up";
    card.setAttribute("aria-label", "Personal invitation details");

    if (!invitation.isValid) {
      card.classList.add("invitee-card--invalid");
      card.append(
        textElement("div", "invitee-card__eyebrow", "Personal Invitation"),
        textElement("div", "invitee-card__name", "Invitation details unavailable"),
        textElement(
          "div",
          "invitee-card__allocation",
          "Please use the complete personal invitation link sent by the hosts."
        )
      );
      return card;
    }

    const ornament = document.createElement("div");
    ornament.className = "invitee-card__ornament";
    const diamond = document.createElement("span");
    diamond.className = "invitee-card__diamond";
    diamond.setAttribute("aria-hidden", "true");
    ornament.appendChild(diamond);

    const allocation = document.createElement("div");
    allocation.className = "invitee-card__allocation";
    allocation.append("This invitation is reserved for ");
    allocation.appendChild(
      textElement(
        "strong",
        "invitee-card__count",
        invitation.guests === 1 ? "1 guest" : `${invitation.guests} guests`
      )
    );
    allocation.append(", including the named invitee.");

    card.append(
      textElement("div", "invitee-card__eyebrow", "Especially Invited"),
      textElement("div", "invitee-card__name", invitation.invitee),
      ornament,
      allocation
    );
    return card;
  }

  function applyInviteeToRsvp(invitation) {
    if (!invitation.isValid) return;

    const nameInput = document.getElementById("f-name");
    if (nameInput) {
      nameInput.value = invitation.invitee;
      nameInput.readOnly = true;
      nameInput.classList.add("invitee-name-locked");
      nameInput.setAttribute("aria-readonly", "true");
    }

    const guestFields = document.getElementById("guest-fields");
    if (guestFields) {
      const note = textElement(
        "div",
        "allocation-note",
        invitation.guests === 1
          ? "Your invitation allocation is limited to 1 guest."
          : `Your invitation allocation is limited to ${invitation.guests} guests.`
      );
      guestFields.insertAdjacentElement("afterbegin", note);
    }

    const plusButton = document.getElementById("guest-plus");
    const minusButton = document.getElementById("guest-minus");
    const guestDisplay = document.getElementById("guest-count-display");

    if (!plusButton || !minusButton || !guestDisplay) return;

    function updatePlusButton() {
      const current = Number.parseInt(guestDisplay.textContent || "1", 10) || 1;
      plusButton.disabled = current >= invitation.guests;
    }

    plusButton.addEventListener("click", function (event) {
      const current = Number.parseInt(guestDisplay.textContent || "1", 10) || 1;
      if (current >= invitation.guests) {
        event.preventDefault();
        event.stopImmediatePropagation();
        plusButton.disabled = true;
      }
    }, true);

    minusButton.addEventListener("click", function () {
      window.setTimeout(updatePlusButton, 0);
    });

    updatePlusButton();
  }

  function initializePersonalInvitation() {
    const invitation = getPersonalInvitation();
    const flyerSection = document.getElementById("flyer-section");

    if (flyerSection) {
      flyerSection.insertAdjacentElement("afterend", buildInviteeCard(invitation));
    }

    if (invitation.isValid) {
      document.title = `${invitation.invitee} | Nethmi & Dinuth`;
      applyInviteeToRsvp(invitation);
    }
  }

  document.addEventListener("DOMContentLoaded", initializePersonalInvitation, { once: true });
})();
</script>


<script>
(function () {
  "use strict";

  function clamp(value, minimum, maximum) {
    return Math.min(Math.max(value, minimum), maximum);
  }

  function initializePremiumExperience() {
    const flyerSection = document.getElementById("flyer-section");
    const flyerImage = flyerSection && flyerSection.querySelector(".flyer-image");
    const inviteeCard = document.querySelector(".invitee-card");
    const audio = document.getElementById("ambient-audio");
    const audioControl = document.getElementById("ambient-audio-control");
    const gate = document.getElementById("gate");
    const reduceMotion = window.matchMedia("(prefers-reduced-motion: reduce)").matches;

    if (flyerSection && flyerImage) {
      flyerSection.classList.add("flyer-stage");

      let frameRequested = false;
      function updateFlyerProgress() {
        frameRequested = false;
        if (reduceMotion) return;

        const stageTop = flyerSection.offsetTop;
        const fadeDistance = Math.max(window.innerHeight * 1.02, 620);
        const progress = clamp((window.scrollY - stageTop) / fadeDistance, 0, 1);
        const opacity = 1 - progress * .82;
        const scale = 1 - progress * .045;
        const blur = progress * 2.4;

        document.documentElement.style.setProperty("--flyer-progress", progress.toFixed(3));
        document.documentElement.style.setProperty("--flyer-opacity", opacity.toFixed(3));
        document.documentElement.style.setProperty("--flyer-scale", scale.toFixed(3));
        document.documentElement.style.setProperty("--flyer-blur", blur.toFixed(2) + "px");
      }

      function requestFlyerUpdate() {
        if (frameRequested) return;
        frameRequested = true;
        window.requestAnimationFrame(updateFlyerProgress);
      }

      window.addEventListener("scroll", requestFlyerUpdate, { passive: true });
      window.addEventListener("resize", requestFlyerUpdate, { passive: true });
      updateFlyerProgress();
    }

    const foregroundElements = [];
    if (inviteeCard) foregroundElements.push(inviteeCard);
    document.querySelectorAll("#root > section:not(#flyer-section) .wrap, #root > footer .wrap").forEach(function (element) {
      foregroundElements.push(element);
    });

    const revealObserver = new IntersectionObserver(function (entries, observer) {
      entries.forEach(function (entry) {
        if (!entry.isIntersecting) return;
        entry.target.classList.add("premium-visible");
        observer.unobserve(entry.target);
      });
    }, { threshold: .12, rootMargin: "0px 0px -8% 0px" });

    foregroundElements.forEach(function (element) {
      element.classList.add("premium-reveal");
      revealObserver.observe(element);
    });

    if (!audio || !audioControl) return;
    audio.volume = .28;

    function updateAudioControl() {
      const playing = !audio.paused && !audio.ended;
      audioControl.classList.toggle("is-playing", playing);
      audioControl.setAttribute("aria-pressed", String(playing));
      audioControl.setAttribute("aria-label", playing ? "Pause background music" : "Play background music");
    }

    async function playAudio() {
      try {
        await audio.play();
        updateAudioControl();
      } catch (error) {
        updateAudioControl();
      }
    }

    audioControl.addEventListener("click", function () {
      if (audioControl.classList.contains("audio-unavailable")) return;
      if (audio.paused) playAudio();
      else audio.pause();
    });

    audio.addEventListener("play", updateAudioControl);
    audio.addEventListener("pause", updateAudioControl);
    audio.addEventListener("error", function () {
      audioControl.classList.add("audio-unavailable");
      audioControl.setAttribute("aria-label", "Background music file unavailable");
      audioControl.title = "Upload engagement-music.mp3 beside index.html to enable music.";
    });

    /* The opening tap is a valid user gesture, so music can start without
       changing the existing gate logic in app.js. */
    if (gate) gate.addEventListener("click", playAudio, { once: true, capture: true });
  }

  document.addEventListener("DOMContentLoaded", function () {
    /* app.js and the personalized card finish during the same event turn. */
    window.requestAnimationFrame(initializePremiumExperience);
  }, { once: true });
})();
</script>
